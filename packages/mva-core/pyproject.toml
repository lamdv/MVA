[project]
name = "mva-core"
version = "0.1.0"
description = "MVA core — agent logic, tools, skills, and configuration"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
    "requests>=2.31",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mva_core"]
