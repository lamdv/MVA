[project]
name = "mva-cli"
version = "0.1.0"
description = "MVA CLI — terminal UI for the MVA agent"
requires-python = ">=3.13"
dependencies = [
    "mva-core",
    "typer>=0.12",
    "rich>=13.0",
    "prompt-toolkit>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mva_cli"]

[tool.uv.sources]
mva-core = { workspace = true }
